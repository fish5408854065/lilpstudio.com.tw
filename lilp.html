<!DOCTYPE html>

  <style>
    * {
      margin: 0;

    html, body {

    body {
      background: #000;

      min-height: 100vh;
    }
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      padding: 1rem;
    }
    nav ul {
      display: flex;
      justify-content: flex-end;
      list-style: none;
      gap: 1.5rem;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.3s;
    }
    nav a:hover {
      color: #9ca3af;
    }
    main {
      padding: 6rem 2rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 3rem;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 4rem;
    }
    .info {
      flex: 1;
      min-width: 280px;
    }
    .info div {
      margin-bottom: 1.5rem;
    }
    .info h3 {
      color: #9ca3af;
      font-size: 0.875rem;
      font-weight: 400;
      margin-bottom: 0.25rem;
    }
    .info p, .info a {
      color: #fff;
      text-decoration: none;
    }
    .info a:hover {
      color: #9ca3af;
    }
    .form-section {
      flex: 1;
      min-width: 280px;
      max-width: 500px;
    }
    .form-section h2 {
      font-size: 1.25rem;
      font-weight: 400;
      margin-bottom: 1.5rem;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    input, textarea {
      background: transparent;
      border: 1px solid #6b7280;
      color: #fff;
      padding: 0.75rem 1rem;
      font-family: inherit;
      letter-spacing: 0.05em;
      font-size: 1rem;
      transition: border-color 0.3s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #fff;
    }
    textarea {
      resize: none;
    }
    button {
      background: #fff;
      color: #000;
      border: none;
      padding: 0.75rem 2rem;
      font-family: inherit;
      letter-spacing: 0.1em;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #d1d5db;
    }
    #form-status {
      margin-top: 1rem;
      font-size: 0.875rem;
      text-align: center;
    }
    @media (min-width: 768px) {
      h1 {

      }
    }
  </style>
</head>
<body>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="lilp.html">Contact</a></li>
      <li><a href="work.html">Portfolio</a></li>
    </ul>
  </nav>

  <main>
    <h1>Contact</h1>
    <div class="container">
      <div class="info">
        <div>
          <h3>MAIL</h3>
          <p>q884884@gmail.com</p>
        </div>
        <div>
          <h3>GITHUB</h3>
          <a href="https://github.com/nightwave1115" target="_blank">github.com/nightwave1115</a>
        </div>
        <div>
          <h3>DISCORD</h3>
          <p>Lilp#5510</p>
        </div>
        <div>
          <h3>WORK</h3>
          <p>目前正再找尋網頁設計相關工作機會</p>
          <p style="color: #9ca3af; margin-top: 0.5rem;">Currently looking for web design related job opportunities</p>
        </div>
      </div>

      <div class="form-section">
        <h2>Send Message</h2>
        <form id="contact-form">
          <input type="text" name="name" placeholder="Your Name" required>
          <input type="email" name="email" placeholder="Your Email" required>
          <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
          <button type="submit">SEND</button>
        </form>
        <p id="form-status"></p>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById('contact-form');
    const status = document.getElementById('form-status');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      status.textContent = 'Sending...';
      status.style.color = '#eab308';
      
      const formData = new FormData(form);
      const data = Object.fromEntries(formData);
      
      try {
        const res = await fetch('https://lilp-website-backend.onrender.com/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        if (res.ok) {
          status.textContent = 'Message sent successfully!';
          status.style.color = '#22c55e';
          form.reset();
        } else {
          throw new Error('Failed to send');
        }
      } catch (err) {
        status.textContent = 'Failed to send message. Please try again.';
        status.style.color = '#ef4444';
      }
      
      setTimeout(() => status.textContent = '', 5000);
    });
  </script>
</body>
</html>
